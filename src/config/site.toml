[config.site]
title = "hypermilla"
description = "documenting my hyperspace journey in public"
pageTitle = "hypermilla | maker of internet things"
pageDescription = "I make things for the web."
repository = "https://github.com/hypermilla/blog"
footerNote = "living hyperspace dreams"

[config.vibe]
showTrail = true

[config.theme]
# Available palettes:
# green-soft, green-vivid, rose-soft, pink-soft, purple-soft, blue-soft, orange-soft, brown-soft
palette = "pink-soft"

[config.comments]
enabled = false
provider = "giscus"
show_on_posts = true

[config.search]
enabled = false
shortcut = "mod+k"
placeholder = "Search notes..."
maxResults = 6

[config.blog]
postsPerPage = 6

[config.comments.giscus]
repo = "dodolalorc/astro-navfolio"
repo_id = "R_kgDOSaQejw"
category = "Announcements"
category_id = "DIC_kwDOSaQej84C9di9"
mapping = "pathname"
strict = "0"
reactions_enabled = "1"
emit_metadata = "0"
input_position = "top"
theme = "preferred_color_scheme"
lang = "zh-CN"
loading = "lazy"

[config.comments.utterances]
repo = ""
issue_term = "pathname"
label = "comment"
theme = "github-light"

[config.comments.waline]
server_url = ""
lang = "zh-CN"
dark = "html.dark"
pageview = true
comment = true

[config.profile]
name = "hypermilla"
handle = "@hypermilla"
role = "internet maker"
company = "independent studio"
location = "remote in hyperspace"
email = "hypermilla@protonmail.com"
website = "https://hypermilla.com/"
github = "https://github.com/hypermilla"
meta = "I make cool things for the web."
avatar = "/images/hypermilla_unipop.jpg"

